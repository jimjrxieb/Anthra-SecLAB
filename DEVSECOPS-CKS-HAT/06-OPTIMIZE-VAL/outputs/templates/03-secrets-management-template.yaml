# =============================================================================
# NIST 800-53 IA-5(7): SECRETS MANAGEMENT TEMPLATE
# =============================================================================
#
# Hardcoded credentials in source code or environment variables are forbidden.
# Use Kubernetes Secrets or an External Secret provider (AWS Secrets Manager).
#
# =============================================================================

# 1. Kubernetes Secret Definition
apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: my-namespace
type: Opaque
stringData:
  # NIST IA-5(7): Never commit real passwords to Git
  db-password: "REPLACE_WITH_SECURE_PASSWORD"
  api-key: "REPLACE_WITH_SECURE_KEY"

---

# 2. Referencing Secrets in a Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardened-app
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            # NIST IA-5(7): Inject secret via environment variable safely
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: db-password

---

# 3. (Recommended) AWS Secrets Manager Integration
# NIST SC-28: Use ExternalSecret for production FedRAMP
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-credentials
  data:
    - secretKey: db-password
      remoteRef:
        key: /production/app/db-password
