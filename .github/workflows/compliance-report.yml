name: Weekly Compliance Report — Anthra

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compliance-report:
    name: "CA-7: Generate Compliance Status Report"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scanners
        run: |
          pip install semgrep
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          wget -qO- https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin

      - name: Run scan-and-map
        # TODO: jsa-secops not yet deployed — Phase 2 scope
        # Stub until GP-Copilot/jsa-secops/scan-and-map.py exists
        run: |
          mkdir -p evidence/scan-reports/
          echo '{"client": "Anthra", "status": "jsa-secops pending Phase 2 deployment", "date": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
            > evidence/scan-reports/status.json
          echo "JSA-SecOps not yet deployed — stub output written"

      - name: Collect evidence
        # TODO: jsa-secops not yet deployed — Phase 2 scope
        # Stub until GP-Copilot/jsa-secops/evidence-collector.sh exists
        run: |
          mkdir -p evidence/
          echo "Evidence collection pending JSA-SecOps deployment (Phase 2)"

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-${{ github.run_id }}
          path: evidence/
          retention-days: 365  # FedRAMP requires 3-year retention
