# app-deploy — Deploy Portfolio app to k3s via ArgoCD
# NIST 800-53: CM-3 (Configuration Change Control)
#
# ArgoCD watches the git repo. This role installs ArgoCD
# and creates the Application manifest. From then on,
# git push = deploy. No kubectl apply.

---
# --- Install Traefik (Ingress) ---

- name: Add Traefik Helm repo
  ansible.builtin.command:
    cmd: helm repo add traefik https://traefik.github.io/charts
  changed_when: true
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: true

- name: Install Traefik
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install traefik traefik/traefik
      --namespace traefik --create-namespace
      --set ports.web.hostPort=80
      --set ports.websecure.hostPort=443
      --set service.type=ClusterIP
      --set providers.kubernetesIngress.enabled=true
      --set providers.kubernetesCRD.enabled=true
      --kubeconfig /etc/rancher/k3s/k3s.yaml
  changed_when: true

# --- Install ArgoCD ---

- name: Create argocd namespace
  ansible.builtin.command:
    cmd: k3s kubectl create namespace argocd
  failed_when: false
  changed_when: true

- name: Install ArgoCD
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -n argocd --server-side -f
      https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  changed_when: true

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command:
    cmd: k3s kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
  changed_when: false

- name: Get ArgoCD admin password
  ansible.builtin.command:
    cmd: k3s kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}'
  register: argocd_password_b64
  changed_when: false

- name: Display ArgoCD admin password
  ansible.builtin.debug:
    msg: "ArgoCD admin password: {{ argocd_password_b64.stdout | b64decode }}"

# --- Create Portfolio Application Namespace ---

- name: Create portfolio namespace
  ansible.builtin.command:
    cmd: k3s kubectl create namespace portfolio
  failed_when: false
  changed_when: true

- name: Label portfolio namespace with PSS (AC-6)
  ansible.builtin.command:
    cmd: >-
      k3s kubectl label namespace portfolio
      pod-security.kubernetes.io/enforce=restricted
      pod-security.kubernetes.io/warn=restricted
      pod-security.kubernetes.io/audit=restricted
      --overwrite
  changed_when: true

# --- Create ArgoCD Application ---
# ArgoCD watches the git repo for Kustomize changes.
# Phase 2 will add the Kustomize overlays that ArgoCD deploys.

- name: Create ArgoCD Application manifest
  ansible.builtin.copy:
    dest: /home/ubuntu/portfolio-application.yaml
    owner: ubuntu
    mode: "0644"
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: portfolio-staging
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: https://github.com/jimjrxieb/Anthra-SecLAB.git
          targetRevision: HEAD
          path: infrastructure/kustomize/overlays/staging
        destination:
          server: https://kubernetes.default.svc
          namespace: portfolio
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ApplyOutOfSyncOnly=true
            - PrunePropagationPolicy=foreground
          retry:
            limit: 5
            backoff:
              duration: 5s
              factor: 2
              maxDuration: 80s

- name: Display next steps
  ansible.builtin.debug:
    msg:
      - "k3s staging host is ready."
      - "ArgoCD installed — watching repo for Kustomize changes."
      - "Next: Push Kustomize overlays to git. ArgoCD deploys automatically."
      - "Access ArgoCD: kubectl port-forward svc/argocd-server -n argocd 8080:443"
