# k3s-install — Install k3s single-node cluster
# NIST 800-53: CM-2 (Baseline Configuration)
#
# Why k3s over kubeadm/EKS:
#   - Single binary, <100MB RAM overhead
#   - Built-in Traefik ingress, CoreDNS, local-path-provisioner
#   - Same K8s API as EKS — ArgoCD, kubectl, Helm all work identically
#   - $15/mo on t3.small vs $73/mo for EKS control plane alone

---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# Encryption config MUST exist before k3s starts (referenced in --kube-apiserver-arg)
- name: Create encryption config for secrets at rest (SC-28)
  ansible.builtin.copy:
    dest: /etc/k3s-encryption.yaml
    mode: "0600"
    content: |
      apiVersion: apiserver.config.k8s.io/v1
      kind: EncryptionConfiguration
      resources:
        - resources:
            - secrets
          providers:
            - aescbc:
                keys:
                  - name: key1
                    secret: "{{ lookup('ansible.builtin.password', '/dev/null', length=32, chars=['ascii_letters', 'digits']) | b64encode }}"
            - identity: {}

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Install k3s
  when: not k3s_binary.stat.exists
  block:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Run k3s install
      ansible.builtin.command:
        cmd: /tmp/k3s-install.sh
      environment:
        INSTALL_K3S_VERSION: "v1.31.4+k3s1"
        K3S_KUBECONFIG_MODE: "644"
        INSTALL_K3S_EXEC: >-
          server
          --tls-san {{ ansible_host }}
          --disable traefik
          --write-kubeconfig-mode 644
          --kube-apiserver-arg=audit-log-path=/var/log/k3s-audit.log
          --kube-apiserver-arg=audit-log-maxage=30
          --kube-apiserver-arg=audit-log-maxbackup=10
          --kube-apiserver-arg=audit-log-maxsize=100
          --kube-apiserver-arg=encryption-provider-config=/etc/k3s-encryption.yaml
      changed_when: true

    - name: Clean up install script
      ansible.builtin.file:
        path: /tmp/k3s-install.sh
        state: absent

- name: Wait for k3s to be ready
  ansible.builtin.command:
    cmd: k3s kubectl get nodes
  register: k3s_nodes
  retries: 30
  delay: 5
  until: k3s_nodes.rc == 0
  changed_when: false

- name: Copy kubeconfig for ubuntu user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Fix kubeconfig server address
  ansible.builtin.replace:
    path: /home/ubuntu/.kube/config
    regexp: "https://127.0.0.1:6443"
    replace: "https://{{ ansible_host }}:6443"

- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Show cluster status
  ansible.builtin.command:
    cmd: k3s kubectl get nodes -o wide
  register: cluster_status
  changed_when: false

- name: Display cluster info
  ansible.builtin.debug:
    var: cluster_status.stdout_lines
