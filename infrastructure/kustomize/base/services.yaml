apiVersion: v1
kind: Service
metadata:
  name: anthra-api
spec:
  selector:
    app: anthra-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: anthra-ui
spec:
  selector:
    app: anthra-ui
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: anthra-log-ingest
spec:
  selector:
    app: anthra-log-ingest
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: anthra-db
spec:
  selector:
    app: anthra-db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
