apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: my-namespace
  labels:
    app.kubernetes.io/instance: app-credentials
    app.kubernetes.io/name: app-credentials
type: Opaque
stringData:
  db-password: REPLACE_WITH_SECURE_PASSWORD
  api-key: REPLACE_WITH_SECURE_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardened-app
  labels:
    app.kubernetes.io/instance: hardened-app
    app.kubernetes.io/name: hardened-app
spec:
  replicas: 2
  template:
    spec:
      automountServiceAccountToken: false
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: app-credentials
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: app-credentials
      containers:
      - name: app
        env:
        - name: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: db-password
    metadata:
      labels:
        app.kubernetes.io/instance: hardened-app
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  labels:
    app.kubernetes.io/instance: app-secrets
    app.kubernetes.io/name: app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-credentials
  data:
  - secretKey: db-password
    remoteRef:
      key: /production/app/db-password
