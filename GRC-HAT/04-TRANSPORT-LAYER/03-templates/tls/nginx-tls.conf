# nginx-tls.conf — Hardened TLS configuration template
# NIST: SC-8 (transmission confidentiality), SC-13 (cryptographic protection), SC-8(1) (HSTS)
# Reference: NIST SP 800-52 Rev 2, Mozilla SSL Configuration Generator (modern profile)
#
# Deploy: Include this file inside your server {} block that handles :443
# Example: include /etc/nginx/conf.d/tls-hardening.conf;

# ─── Protocol Versions ──────────────────────────────────────────────────────
# WHY SC-8: NIST SP 800-52 Rev 2 requires TLS 1.2 minimum for federal systems.
# TLS 1.3 is preferred — eliminates handshake round-trips, no CBC mode, no RSA key exchange.
# SSLv3, TLS 1.0, TLS 1.1 are deprecated per RFC 8996 (March 2021) — prohibit explicitly.
ssl_protocols TLSv1.2 TLSv1.3;

# ─── Cipher Suites ──────────────────────────────────────────────────────────
# WHY SC-13: NIST requires FIPS-validated cryptographic mechanisms.
# ECDHE provides Perfect Forward Secrecy — compromise of long-term key does not
# expose past session traffic. AESGCM provides authenticated encryption (AEAD).
# CHACHA20-POLY1305 is preferred on mobile/ARM where AES-NI is unavailable.
# Excluded: RC4 (broken), 3DES (SWEET32), CBC mode (BEAST/POODLE), MD5/SHA1 MACs.
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

# WHY: Set to 'off' — allows clients to select fastest supported cipher.
# With TLS 1.3 only offering AEAD ciphers, server preference is unnecessary.
# With TLS 1.2 and our cipher list all being strong, client preference is safe.
ssl_prefer_server_ciphers off;

# ─── HSTS — HTTP Strict Transport Security ──────────────────────────────────
# WHY SC-8(1): Cryptographic protection specifically addresses HTTP downgrade attacks.
# HSTS tells browsers to ONLY connect via HTTPS for max-age seconds.
# includeSubDomains: extends protection to all subdomains (required for preload).
# max-age=31536000: 1 year — HSTS preload list minimum requirement.
# 'always': send HSTS on all response codes including errors (critical for security).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ─── Session Management ──────────────────────────────────────────────────────
# WHY SC-23 (session authenticity): Session tickets share a session key across workers.
# Shared cache is more memory-efficient than per-worker; 10m handles ~40K sessions.
ssl_session_cache shared:SSL:10m;

# WHY: 1 day session timeout balances usability and security.
# Long-lived sessions reduce re-handshake overhead. 1d is the Mozilla modern recommendation.
ssl_session_timeout 1d;

# WHY: Session tickets can allow session resumption with a static ticket key.
# Disabling session tickets forces full handshake — eliminates ticket key compromise risk.
# If you enable tickets, rotate the ticket key frequently (every 6 hours minimum).
ssl_session_tickets off;

# ─── DH Parameters ──────────────────────────────────────────────────────────
# WHY SC-13: Weak DH parameters (Logjam attack) break forward secrecy.
# Generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096
# Note: Only needed for DHE cipher suites. Our cipher list uses ECDHE exclusively,
# so this is belt-and-suspenders for any legacy fallback.
# ssl_dhparam /etc/nginx/dhparam.pem;

# ─── OCSP Stapling ──────────────────────────────────────────────────────────
# WHY SC-23 (session authenticity): OCSP stapling lets the server provide
# certificate revocation status to the client without the client contacting
# the CA. Reduces latency and improves privacy (client doesn't expose visited domains to CA).
ssl_stapling on;
ssl_stapling_verify on;

# WHY: Trusted certificate chain required for OCSP stapling verification.
# Your ssl_trusted_certificate should include the full chain (intermediate + root CA).
# ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

# Resolver for OCSP lookups — use your DNS resolver or a public one.
# WHY: Without a resolver, OCSP stapling silently fails.
# resolver 8.8.8.8 8.8.4.4 valid=300s;
# resolver_timeout 5s;

# ─── Certificate Paths ──────────────────────────────────────────────────────
# WHY: Certificate and key paths — customize for your deployment.
# For cert-manager: reference the kubernetes secret mounted as a volume.
# ssl_certificate     /etc/nginx/ssl/tls.crt;
# ssl_certificate_key /etc/nginx/ssl/tls.key;

# ─── Additional Security Headers ────────────────────────────────────────────
# WHY: Defense in depth — additional headers reduce attack surface at L7.
# These belong here alongside TLS config since they reinforce transport security.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Verification ────────────────────────────────────────────────────────────
# After deploying, verify with:
#   testssl.sh --severity HIGH your.domain:443
#   echo | openssl s_client -connect your.domain:443 -tls1 2>&1 | grep -E "alert|BEGIN"
#   curl -sI https://your.domain | grep -i strict-transport
