# ── Usage ──────────────────────────────────────────────────────────────────
# Encrypt: sops --encrypt --in-place secrets/my-secret.yaml
# Decrypt: sops --decrypt secrets/my-secret.yaml
# Edit:    sops secrets/my-secret.yaml  (opens decrypted in $EDITOR, re-encrypts on save)
# View:    sops --decrypt secrets/my-secret.yaml | kubectl apply -f -
#
# CI/CD (GitHub Actions):
#   env:
#     SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}  # Store private key in Actions secret
