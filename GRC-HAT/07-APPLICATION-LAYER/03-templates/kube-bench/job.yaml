# kube-bench CIS Kubernetes Benchmark Job
# NIST: CM-6 (configuration settings), CM-7 (least functionality)
# WHY: kube-bench audits the cluster against CIS benchmarks automatically.
# Run this as a one-off job to get a full benchmark report.
# Results go to pod logs — capture with: kubectl logs -n kube-bench -l job-name=kube-bench
---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-bench
  labels:
    # WHY: Dedicated namespace isolates security tooling from workloads
    app.kubernetes.io/name: kube-bench
    security-audit: "true"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kube-bench
  namespace: kube-bench
  labels:
    app: kube-bench
    nist-control: CM-6
  annotations:
    description: "CIS Kubernetes Benchmark scan — CM-6 configuration audit"
spec:
  # WHY: Never retry — if it fails, investigate; don't loop
  backoffLimit: 0
  # Clean up completed job after 10 minutes — prevents clutter
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: kube-bench
    spec:
      # WHY: Restart never — this is a one-shot audit job
      restartPolicy: Never

      # WHY: Host network + PID namespace gives kube-bench access to
      # kubelet configuration and running processes for accurate audit
      hostPID: true
      hostNetwork: true
      hostIPC: false  # Not needed for kube-bench

      # WHY: Must run as root to read kube configs and process info
      # Security exception: audit tools require elevated access
      securityContext:
        runAsUser: 0

      containers:
        - name: kube-bench
          # WHY: Pin version — never use latest in audit tooling
          image: aquasec/kube-bench:v0.7.1
          command: ["kube-bench"]
          args:
            - "--json"          # Machine-parseable output for SIEM/reporting
            - "--outputfile"    # Write to file as well as stdout
            - "/tmp/kube-bench-results.json"

          # WHY: Read-only filesystem for the container itself
          securityContext:
            readOnlyRootFilesystem: false  # kube-bench needs to write results
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_RAW"]  # Required for some network checks
              drop: ["ALL"]

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Mount host filesystem for reading K8s configurations
          volumeMounts:
            # WHY: kube-bench reads these to audit API server and kubelet config
            - name: var-lib-etcd
              mountPath: /var/lib/etcd
              readOnly: true
            - name: var-lib-kubelet
              mountPath: /var/lib/kubelet
              readOnly: true
            - name: var-lib-kube-scheduler
              mountPath: /var/lib/kube-scheduler
              readOnly: true
            - name: var-lib-kube-controller-manager
              mountPath: /var/lib/kube-controller-manager
              readOnly: true
            - name: etc-systemd
              mountPath: /etc/systemd
              readOnly: true
            - name: lib-systemd
              mountPath: /lib/systemd/
              readOnly: true
            - name: srv-kubernetes
              mountPath: /srv/kubernetes/
              readOnly: true
            - name: etc-kubernetes
              mountPath: /etc/kubernetes
              readOnly: true
            - name: usr-bin
              mountPath: /usr/local/mount-from-host/bin
              readOnly: true
            - name: etc-cni-netd
              mountPath: /etc/cni/net.d/
              readOnly: true
            - name: opt-cni-bin
              mountPath: /opt/cni/bin/
              readOnly: true

      volumes:
        - name: var-lib-etcd
          hostPath:
            path: "/var/lib/etcd"
        - name: var-lib-kubelet
          hostPath:
            path: "/var/lib/kubelet"
        - name: var-lib-kube-scheduler
          hostPath:
            path: "/var/lib/kube-scheduler"
        - name: var-lib-kube-controller-manager
          hostPath:
            path: "/var/lib/kube-controller-manager"
        - name: etc-systemd
          hostPath:
            path: "/etc/systemd"
        - name: lib-systemd
          hostPath:
            path: "/lib/systemd"
        - name: srv-kubernetes
          hostPath:
            path: "/srv/kubernetes"
        - name: etc-kubernetes
          hostPath:
            path: "/etc/kubernetes"
        - name: usr-bin
          hostPath:
            path: "/usr/bin"
        - name: etc-cni-netd
          hostPath:
            path: "/etc/cni/net.d/"
        - name: opt-cni-bin
          hostPath:
            path: "/opt/cni/bin/"

      # WHY: ServiceAccount with minimal permissions — kube-bench only reads
      serviceAccountName: kube-bench
      automountServiceAccountToken: false  # Not needed by kube-bench
---
# ServiceAccount for kube-bench
# WHY: Least-privilege service account — no RBAC needed for kube-bench
# (it reads host filesystem, not Kubernetes API)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-bench
  namespace: kube-bench
automountServiceAccountToken: false
