# arpwatch Gold-Standard Configuration
# NIST Controls: SI-4 (System Monitoring), AC-6 (Least Privilege)
#
# HOW TO USE:
#   1. Copy this file to /etc/default/arpwatch or /etc/sysconfig/arpwatch
#   2. Set INTERFACES to your monitored network interface
#   3. Set MAILTO to your SOC distribution list or leave empty for syslog-only
#   4. Verify RUNAS is set to a non-root, non-privileged account
#   5. Restart arpwatch: systemctl restart arpwatch
#
# See also: 02-fixers/fix-arp-monitoring.sh for automated deployment

# -----------------------------------------------------------------------------
# INTERFACES — Network interface(s) to monitor for ARP traffic
#
# WHY: arpwatch must listen on the correct interface where endpoint traffic
# exists. A wrong interface means zero ARP events — a silent SI-4 gap.
#
# NIST SI-4: "Monitor the information system to detect attacks and indicators
# of potential attacks." Monitoring the correct interface is prerequisite.
#
# Format: -i <interface>  (single)
#         -i <iface1> -i <iface2>  (multiple — run multiple arpwatch instances)
# -----------------------------------------------------------------------------
INTERFACES="-i eth0"

# -----------------------------------------------------------------------------
# MAILTO — Email address for arpwatch event notifications
#
# WHY: arpwatch sends email for new station, flip-flop, and MAC change events.
# In a SOC context, these alerts should go to the SIEM (via syslog) rather
# than email. Set to empty to disable email and rely on syslog forwarding.
#
# For lab/dev environments: use your own address for visibility.
# For production: use syslog forwarding (see rsyslog config in fix-arp-monitoring.sh)
# and disable email to avoid alert fatigue.
#
# NIST SI-4(2): Automated tools to support real-time analysis of events.
# -----------------------------------------------------------------------------
MAILTO=""

# -----------------------------------------------------------------------------
# RUNAS — User account arpwatch drops privileges to after binding the socket
#
# WHY: arpwatch must initially run as root to open a raw socket on the interface.
# After the socket is open, it drops to this unprivileged user. This limits
# blast radius if arpwatch is compromised.
#
# NIST AC-6 (Least Privilege): "Employ the principle of least privilege,
# allowing only authorized accesses for users (or processes acting on behalf
# of users) which are necessary to accomplish assigned tasks."
#
# The 'arpwatch' user is created by the package installer with no shell
# and no home directory. Do NOT change this to root or a shell-enabled user.
# -----------------------------------------------------------------------------
RUNAS="arpwatch"

# -----------------------------------------------------------------------------
# DATAFILE — Path to the arpwatch database file (MAC-IP pair records)
#
# WHY: This database is the source of truth for known MAC-IP pairs. arpwatch
# compares all ARP traffic against this file. If it doesn't exist or is not
# writable by the RUNAS user, arpwatch will not persist new stations.
#
# The directory must be writable by RUNAS (arpwatch user).
#
# Evidence value: This file is auditor evidence that L2 asset inventory is
# being maintained. Include in evidence packages.
#
# NIST SI-4: Asset-level monitoring requires a known-good baseline (this file).
# -----------------------------------------------------------------------------
DATAFILE="-f /var/lib/arpwatch/arp.dat"

# -----------------------------------------------------------------------------
# Additional flags (advanced)
#
# -n <net[/width]>  — Only report on this network (suppress noise from routers)
# -r <file>         — Read from a pcap file instead of live capture
# -p                — Don't put the interface in promiscuous mode
#                     (use only if another tool is already in promisc mode)
# -u <user>         — Override RUNAS user (same as RUNAS above)
#
# Example for a /24 subnet only:
#   EXTRA_ARGS="-n 10.10.10.0/24"
# -----------------------------------------------------------------------------
EXTRA_ARGS=""

# -----------------------------------------------------------------------------
# Full command line constructed by init script or systemd unit:
#   /usr/sbin/arpwatch $INTERFACES -u $RUNAS $DATAFILE $EXTRA_ARGS
# -----------------------------------------------------------------------------
