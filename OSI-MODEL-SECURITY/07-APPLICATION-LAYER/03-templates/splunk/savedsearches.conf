# savedsearches.conf — JSA Security Correlation Searches
# NIST: AU-6 (audit review), SI-4 (monitoring), AC-6 (least privilege), SI-7 (integrity), AC-7 (failed logins)
# Deploy to: $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
# Reload: splunk reload saved-searches OR use fix-splunk-alert-rules.sh

[default]
# All security searches inherit these defaults
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 1h

# ─── Failed Login Threshold ───────────────────────────────────────────────────
# WHY: 5+ failures from one IP in 5 minutes is brute force. No legitimate user
# fails this many times this fast. Low false positive rate.
# NIST: AC-7 (unsuccessful logon attempts), AU-6 (audit review)
# MITRE: T1110 — Brute Force / Credential Access
[JSA-Failed-Login-Threshold]
search = index=main (sourcetype=WinEventLog EventCode=4625) OR (sourcetype=linux_secure "Failed password") | stats count as FailedAttempts, values(user) as TargetAccounts by src_ip | where FailedAttempts > 5 | eval Severity="High", MITRETechnique="T1110", NISTControl="AC-7"
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = src_ip
description = Detects 5+ failed logins from single IP — brute force indicator. NIST AC-7. MITRE T1110.

# ─── Privilege Escalation ─────────────────────────────────────────────────────
# WHY: EventCode 4672 is special privilege assignment — admin-equivalent access.
# 4728/4732 are global/local group additions — lateral movement via group.
# Any of these should be reviewed immediately.
# NIST: AC-6 (least privilege), AU-6 (audit review)
# MITRE: T1548 — Abuse Elevation Control Mechanism
[JSA-Privilege-Escalation]
search = index=wineventlog (EventCode=4672 OR EventCode=4728 OR EventCode=4732) | eval PrivType=case(EventCode=4672,"SpecialPrivileges", EventCode=4728,"GlobalGroupMember", EventCode=4732,"LocalGroupMember") | stats count by user, src_ip, EventCode, PrivType | eval Severity="High", MITRETechnique="T1548", NISTControl="AC-6" | where NOT match(user, "^(SYSTEM|LOCAL SERVICE|NETWORK SERVICE)")
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = user
description = Detects privilege assignment and group membership changes. NIST AC-6. MITRE T1548.

# ─── File Integrity Change ────────────────────────────────────────────────────
# WHY: Changes to /etc/passwd, /etc/shadow, sudoers, or SSH config are
# pre-attack modification signals. Wazuh FIM captures these in real-time.
# SI-7 requires detecting unauthorized software or file changes.
# NIST: SI-7 (software and information integrity)
# MITRE: T1565 — Data Manipulation / T1098 — Account Manipulation
[JSA-File-Integrity-Change]
search = index=security sourcetype=wazuh "rule.groups{}"="syscheck" | eval ChangeType=mvindex('syscheck.event',0) | stats count by agent.name, syscheck.path, ChangeType, agent.ip | eval Severity="High", MITRETechnique="T1565", NISTControl="SI-7"
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */10 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = syscheck.path
description = File integrity change detected on monitored path. NIST SI-7. MITRE T1565.

# ─── Rare Outbound Connection ─────────────────────────────────────────────────
# WHY: C2 beaconing uses unusual destination ports or new external hosts.
# Connections to IPs that haven't appeared in 7 days are worth investigating.
# This is tuning-intensive — start in report mode, alert after baselining.
# NIST: SI-4 (information system monitoring)
# MITRE: T1048 — Exfiltration Over Alternative Protocol / T1071 — C2
[JSA-Rare-Outbound-Connection]
search = index=network sourcetype=suricata event_type=flow dest_port IN (4444,1337,31337,6667,6697,8443,8080) | stats count by src_ip, dest_ip, dest_port, proto | where count < 3 | eval Severity="Medium", MITRETechnique="T1048", NISTControl="SI-4"
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 2
alert.suppress = 1
alert.suppress.period = 4h
alert.suppress.fields = dest_ip
description = Outbound connection to uncommon high-risk port. NIST SI-4. MITRE T1048.

# ─── Database from Unexpected Source ─────────────────────────────────────────
# WHY: Database ports (5432, 3306, 1433, 27017) should only be accessed by
# application servers — not workstations, not external IPs. Any deviation
# indicates either lateral movement or a misconfigured access control.
# NIST: AC-3 (access enforcement), AC-17 (remote access)
# MITRE: T1078 — Valid Accounts / unauthorized DB access
[JSA-DB-Unexpected-Source]
search = index=network sourcetype=suricata event_type=flow dest_port IN (5432,3306,1433,27017,6379,9200) | lookup app_servers ip AS src_ip OUTPUT is_app_server | where isnull(is_app_server) OR is_app_server=0 | stats count by src_ip, dest_ip, dest_port | eval Severity="High", MITRETechnique="T1078", NISTControl="AC-3"
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = src_ip
description = Database port access from non-app-server source. NIST AC-3. MITRE T1078.

# ─── Kubernetes exec in Production ───────────────────────────────────────────
# WHY: kubectl exec into a production pod is a red flag. Developers do not
# need shell access to running containers in prod — that's what logs are for.
# Container exec is the #1 signal of an active breach investigation target.
# NIST: SI-4 (monitoring), AC-6 (least privilege)
# MITRE: T1609 — Container Administration Command
[JSA-K8s-Exec-Production]
search = index=k8s sourcetype=kube:apiserver:audit verb=create requestURI="/api/v1/namespaces/*/pods/*/exec" responseStatus.code=101 | spath input=user output=Username path=username | spath input=objectRef output=PodName path=name | spath input=objectRef output=Namespace path=namespace | where Namespace="production" OR Namespace="prod" | stats count by Username, PodName, Namespace, sourceIPAddresses{} | eval Severity="High", MITRETechnique="T1609", NISTControl="SI-4"
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
disabled = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 0
description = kubectl exec into production pod — immediate investigation required. NIST SI-4. MITRE T1609.
