apiVersion: apps/v1
kind: Deployment
metadata:
  name: anthra-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anthra-db
  template:
    metadata:
      labels:
        app: anthra-db
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: anthra
            - name: POSTGRES_USER
              value: anthra
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anthra-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "anthra"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "anthra"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: db-data
          emptyDir: {}
        - name: init-sql
          configMap:
            name: anthra-db-init
