# cloudwatch-agent — Ship logs and metrics to CloudWatch
# NIST 800-53: AU-6 (Audit Review), SI-4 (System Monitoring)
#
# Requires IAM instance profile with CloudWatch permissions
# (handled by Terraform ec2 module)

---
- name: Download CloudWatch agent
  ansible.builtin.get_url:
    url: https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
    dest: /tmp/amazon-cloudwatch-agent.deb
    mode: "0644"

- name: Install CloudWatch agent
  ansible.builtin.apt:
    deb: /tmp/amazon-cloudwatch-agent.deb
    state: present

- name: Configure CloudWatch agent
  ansible.builtin.copy:
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    mode: "0644"
    content: |
      {
        "agent": {
          "metrics_collection_interval": 60,
          "logfile": "/opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log"
        },
        "logs": {
          "logs_collected": {
            "files": {
              "collect_list": [
                {
                  "file_path": "/var/log/syslog",
                  "log_group_name": "/k3s/{{ project_name }}-{{ environment }}/cluster",
                  "log_stream_name": "{instance_id}/syslog",
                  "retention_in_days": 365
                },
                {
                  "file_path": "/var/log/audit/audit.log",
                  "log_group_name": "/k3s/{{ project_name }}-{{ environment }}/auditd",
                  "log_stream_name": "{instance_id}/auditd",
                  "retention_in_days": 365
                },
                {
                  "file_path": "/var/log/k3s-audit.log",
                  "log_group_name": "/k3s/{{ project_name }}-{{ environment }}/cluster",
                  "log_stream_name": "{instance_id}/k3s-audit",
                  "retention_in_days": 365
                },
                {
                  "file_path": "/var/log/auth.log",
                  "log_group_name": "/k3s/{{ project_name }}-{{ environment }}/cluster",
                  "log_stream_name": "{instance_id}/auth",
                  "retention_in_days": 365
                }
              ]
            }
          }
        },
        "metrics": {
          "namespace": "CWAgent",
          "metrics_collected": {
            "cpu": {
              "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
              "metrics_collection_interval": 60,
              "totalcpu": true
            },
            "mem": {
              "measurement": ["mem_used_percent", "mem_available_percent"],
              "metrics_collection_interval": 60
            },
            "disk": {
              "measurement": ["disk_used_percent", "disk_free"],
              "metrics_collection_interval": 60,
              "resources": ["/"]
            },
            "net": {
              "measurement": ["bytes_sent", "bytes_recv"],
              "metrics_collection_interval": 60,
              "resources": ["*"]
            }
          }
        }
      }
  vars:
    project_name: "anthra"
    environment: "staging"
  notify: restart cloudwatch agent

- name: Start CloudWatch agent
  ansible.builtin.command:
    cmd: >-
      /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
      -a fetch-config
      -m ec2
      -s
      -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
  changed_when: true

- name: Enable CloudWatch agent service
  ansible.builtin.systemd:
    name: amazon-cloudwatch-agent
    state: started
    enabled: true

- name: Clean up installer
  ansible.builtin.file:
    path: /tmp/amazon-cloudwatch-agent.deb
    state: absent

