# cluster-harden — K8s-level hardening (works on BOTH k3s and EKS)
# NIST 800-53: SC-7 (Boundary Protection), CM-6 (Configuration Settings),
#              AC-6 (Least Privilege)
#
# This role operates at the K8s API level — it doesn't care whether the
# cluster is k3s on EC2 or EKS managed. Same kubectl commands, same result.
#
# Matches GP-CONSULTING/02-CLUSTER-HARDEN playbooks.

---
# --- Create namespace first ---

- name: Create portfolio namespace
  ansible.builtin.command:
    cmd: k3s kubectl create namespace portfolio
  failed_when: false
  changed_when: true

# --- Default-Deny NetworkPolicy (SC-7) ---

- name: Create default-deny NetworkPolicy for portfolio namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-all
        namespace: portfolio
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
          - Egress
  changed_when: true

- name: Allow DNS egress for portfolio namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-dns
        namespace: portfolio
      spec:
        podSelector: {}
        policyTypes:
          - Egress
        egress:
          - to: []
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
  changed_when: true

- name: Allow ingress from Traefik to portfolio services
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-traefik-ingress
        namespace: portfolio
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: traefik
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
  changed_when: true

- name: Allow portfolio pods to talk to each other
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-intra-namespace
        namespace: portfolio
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
          - Egress
        ingress:
          - from:
              - podSelector: {}
        egress:
          - to:
              - podSelector: {}
  changed_when: true

# --- Block cloud metadata API (AC-6) ---

- name: Block metadata API egress (169.254.169.254)
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: block-metadata-api
        namespace: portfolio
      spec:
        podSelector: {}
        policyTypes:
          - Egress
        egress:
          - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                    - 169.254.169.254/32
  changed_when: true

# --- Pod Security Standards (AC-6) ---

- name: Enforce restricted PSS on portfolio namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl label namespace portfolio
      pod-security.kubernetes.io/enforce=restricted
      pod-security.kubernetes.io/warn=restricted
      pod-security.kubernetes.io/audit=restricted
      --overwrite
  changed_when: true

# --- ResourceQuota (CM-6) ---

- name: Apply ResourceQuota to portfolio namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: portfolio-quota
        namespace: portfolio
      spec:
        hard:
          requests.cpu: "2"
          requests.memory: 4Gi
          limits.cpu: "4"
          limits.memory: 8Gi
          count/deployments.apps: "10"
          count/services: "10"
          persistentvolumeclaims: "5"
  changed_when: true

# --- LimitRange (CM-6) ---

- name: Apply LimitRange to portfolio namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: |
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: portfolio-limits
        namespace: portfolio
      spec:
        limits:
          - type: Container
            default:
              cpu: 500m
              memory: 512Mi
            defaultRequest:
              cpu: 100m
              memory: 128Mi
            max:
              cpu: "2"
              memory: 2Gi
  changed_when: true

- name: Display cluster hardening status
  ansible.builtin.debug:
    msg:
      - "Cluster hardening applied to portfolio namespace:"
      - "  - Default-deny NetworkPolicy (SC-7)"
      - "  - DNS egress allowed (SC-7)"
      - "  - Traefik ingress allowed (SC-7)"
      - "  - Intra-namespace communication allowed (SC-7)"
      - "  - Cloud metadata API blocked (AC-6)"
      - "  - Pod Security Standards: restricted (AC-6)"
      - "  - ResourceQuota applied (CM-6)"
      - "  - LimitRange applied (CM-6)"
