# Ansible inventory for Anthra-SecLAB staging
# After terraform apply, update k3s_host IP from: terraform output k3s_public_ip
#
# Or use dynamic inventory with aws_ec2 plugin (requires boto3):
#   plugin: aws_ec2
#   filters:
#     tag:Ansible: "true"
#     tag:Project: anthra-fedramp

all:
  children:
    k3s:
      hosts:
        k3s_host:
          ansible_host: "35.175.161.255"  # terraform output k3s_public_ip
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/anthra-k3s
          ansible_python_interpreter: /usr/bin/python3
