# Anthra-SecLAB — Local Attack Lab
#
# Start:  docker compose up --build -d
# Stop:   docker compose down
# Nuke:   docker compose down -v  (wipes DB)
#
# Endpoints:
#   UI:         http://localhost:3000
#   API:        http://localhost:8080
#   Log Ingest: http://localhost:9090
#   PostgreSQL: localhost:5432
#
# Default creds (intentionally weak — this is a security lab):
#   DB:    anthra / anthra123
#   Admin: admin  / admin123 (MD5 hashed — intentional vuln)

services:
  db:
    image: postgres:15
    container_name: anthra-db
    environment:
      POSTGRES_DB: anthra
      POSTGRES_USER: anthra
      POSTGRES_PASSWORD: anthra123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthra"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    container_name: anthra-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: anthra
      DB_USER: anthra
      DB_PASSWORD: anthra123
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: ./ui
    container_name: anthra-ui
    ports:
      - "3000:8080"
    depends_on:
      - api

  log-ingest:
    build: ./services
    container_name: anthra-log-ingest
    ports:
      - "9090:9090"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: anthra
      DB_USER: anthra
      DB_PASSWORD: anthra123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: anthra_seclab_pgdata
